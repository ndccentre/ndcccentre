name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to cPanel via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          port: ${{ secrets.CPANEL_PORT }}
          command_timeout: 10m
          script: |
            export PATH=$HOME/bin:/usr/local/bin:/opt/cpanel/composer/bin:$PATH

            # Navigate to project directory
            cd $HOME/ndpccenter.co.tz || exit 1

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Install PHP dependencies
            composer install --no-dev --optimize-autoloader --no-interaction --no-progress

            # Install Node dependencies and build assets
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            npm ci --ignore-scripts
            npm run build

            # Run Laravel optimizations
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link 2>/dev/null || true
            php artisan youtube:import 2>/dev/null || true

            echo "✅ Deployment to ndpccenter.co.tz complete!"
